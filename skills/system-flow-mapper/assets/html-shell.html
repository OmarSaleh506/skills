<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>__TITLE__</title>
  <style>
    :root {
      --bg: #fafaf7;
      --panel: #ffffff;
      --ink: #1a2230;
      --muted: #5a6573;
      --accent: #1e6091;
      --accent-soft: #e6f0f7;
      --border: #e3e6eb;
      --radius: 14px;
      --shadow: 0 1px 2px rgba(20,30,40,.04), 0 8px 24px rgba(20,30,40,.06);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      font-size: 17px;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 56px 28px 96px;
    }
    header.page {
      margin-bottom: 56px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 28px;
    }
    .eyebrow {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      font-weight: 600;
      margin: 0 0 12px;
    }
    h1 {
      font-size: 38px;
      line-height: 1.2;
      margin: 0 0 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    h2 {
      font-size: 26px;
      line-height: 1.25;
      margin: 0 0 14px;
      font-weight: 700;
      letter-spacing: -0.005em;
    }
    h3 {
      font-size: 19px;
      margin: 0 0 8px;
      font-weight: 600;
      color: var(--accent);
    }
    p.lead {
      font-size: 18px;
      color: var(--muted);
      margin: 0 0 8px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 36px;
      margin-bottom: 28px;
      box-shadow: var(--shadow);
    }
    section.intro { background: var(--accent-soft); border-color: #c9def0; }
    section .label {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
    }
    section p {
      color: var(--ink);
      margin: 8px 0 0;
    }
    .diagram {
      margin-top: 22px;
      background: #fdfdfb;
      border: 1px dashed #d6dbe2;
      border-radius: 10px;
      padding: 18px 14px;
      overflow-x: auto;
      text-align: center;
    }
    .diagram svg { max-width: 100% !important; height: auto !important; }
    ul.plain {
      margin: 10px 0 0;
      padding-left: 22px;
      color: var(--ink);
    }
    ul.plain li { margin: 4px 0; }
    footer.page {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-top: 48px;
      padding-top: 22px;
      border-top: 1px solid var(--border);
    }
    .pill {
      display: inline-block;
      background: #f1f3f5;
      color: var(--ink);
      padding: 2px 9px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      margin-right: 4px;
    }
    .grid-people {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }
    .person {
      background: #fdfdfb;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .person strong { color: var(--accent); }
    .toc {
      background: #f6f7f5;
      border-radius: 10px;
      padding: 16px 20px;
      margin-top: 22px;
    }
    .toc a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .toc a:hover { text-decoration: underline; }
    .toc ul { margin: 6px 0; padding-left: 20px; }
    @media (max-width: 640px) {
      .container { padding: 32px 18px 64px; }
      section { padding: 24px 22px; }
      h1 { font-size: 30px; }
      h2 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="container">
__CONTENT__
  </div>

  <script>
/*! Mermaid bundle inlined below — works fully offline */
__MERMAID_JS__
  </script>
  <script>
    mermaid.initialize({
      startOnLoad: true,
      theme: 'default',
      themeVariables: {
        fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif',
        primaryColor: '#e6f0f7',
        primaryTextColor: '#1a2230',
        primaryBorderColor: '#1e6091',
        lineColor: '#5a6573',
        background: '#fdfdfb',
        fontSize: '15px'
      },
      flowchart: { htmlLabels: true, curve: 'basis', padding: 14 }
    });
  </script>
</body>
</html>
